[runtime]
sampler = multinest
verbosity = standard

; This parameter is used several times in this file, so is
; put in the DEFAULT section and is referenced below as %(2PT_FILE)s
[DEFAULT]
default_sample = forecast_sample
default_survey = forecast_sample
2PT_FILE = $DATA_DIR/%(default_survey)s_Roman_redmagic_wide_photoz.fits

[pipeline]
modules =  consistency  bbn_consistency
           read_pk read_pk_lin growth
           unbiased_galaxies fast_pt fits_nz
           pk_to_cl_gg IA 
           flatten_gi flatten_ii 
           wgp_photoz wpp_photoz wgg_photoz
           apply_photoz_factor
           ia_like


likelihoods = iacorr
timing=T
debug=F
values = $IA_LIB1/examples/values-forecast.ini
extra_output = data_vector/iacorr_chi2


; It's worth switching this to T when sampling using multinest, polychord,
; or other samplers that can take advantage of differences in calculation speeds between
; different parameters.
fast_slow = F
first_fast_module = shear_m_bias
; For some use cases this might be faster:
;first_fast_module=lens_photoz_width

[polychord]
base_dir = output/y3-polychord-checkpoints
polychord_outfile_root = y3
resume = F
feedback = 3
fast_fraction = 0.1

;Minimum settings
live_points = 250
num_repeats = 30
tolerance = 0.1

[output]
filename = $IA_LIB1/output/%(default_survey)s_Roman_redmagic_wide_photoz.txt
format=text

; you can set this to T if you don't want 
privacy = F

[multinest]
max_iterations = 100000
live_points = 8000

[test]
save_dir=$IA_LIB1/output/%(default_survey)s_test_sampler
fatal_errors=T

[consistency]
file = $COSMOSIS_LIB/utility/consistency/consistency_interface.py

[bbn_consistency]
file = $COSMOSIS_LIB/utility/bbn_consistency/bbn_consistency.py

[read_pk]
file = $IA_LIB/util/read_pk/read_pk.py
pk_loc = $IA_LIB/output/pk_fid/
pk_type = matter_power_nl
distances = True

[read_pk_lin]
file = $IA_LIB/util/read_pk/read_pk.py
pk_loc = $IA_LIB/output/pk_fid/
pk_type = matter_power_lin
distances = False

[unbiased_galaxies]
file = $COSMOSIS_LIB/bias/no_bias/no_bias.py
use_lin_power=False

[apply_photoz_factor]
file=$IA_LIB/util/photoz_factor/photoz_factor.py
sample_a = %(default_sample)s_density
sample_b = %(default_sample)s_shape
do_gi=F
do_ii=F

[camb]
file = $COSMOSIS_LIB/boltzmann/camb/camb_interface.py
mode = power
lmax = 2500          ;max ell to use for cmb calculation
feedback=3         ;amount of output to print
AccuracyBoost=1.1 ;CAMB accuracy boost parameter
do_tensors = T
do_lensing = T
NonLinear = pk
; WARNING: this is the original Smith et al halofit. It's old and crap. We shouldn't use it for anything new -- it's only set here so we can reproduce the results in https://arxiv.org/pdf/1411.1755
;halofit_version = original 
halofit_version = takahashi
zmin_background = 0.
zmax_background = 4.
nz_background = 150
kmin=1e-4
kmax = 50.0
kmax_extrapolate = 500.0
nk=700

[growth]
file=$COSMOSIS_LIB/structure/growth_factor/interface.so
zmin=0.
zmax=4.
nz=401

[flatten_gi]
file = $IA_LIB/util/flatten_pk2/flatten_pk.py
sample_a=%(default_sample)s_density
sample_b=%(default_sample)s_shape
pk_name = galaxy_intrinsic_power
window_function=True
add_bias = False
add_intrinsic_alignments=False

[flatten_ii]
file = $IA_LIB/util/flatten_pk2/flatten_pk.py
sample_a=%(default_sample)s_shape
sample_b=%(default_sample)s_shape
pk_name = intrinsic_power
window_function=True
add_bias = False
add_intrinsic_alignments=False


[fits_nz]
file = $COSMOSIS_LIB/number_density/load_nz_fits/load_nz_fits.py
nz_file = %(2PT_FILE)s
data_sets = %(default_sample)s_density %(default_sample)s_shape
prefix_section = T
prefix_extension = T

[fast_pt]
file = $COSMOSIS_LIB/structure/fast_pt/fast_pt_interface.py
do_ia = T
k_res_fac = 0.5
verbose = F

[IA]
file = $COSMOSIS_LIB/intrinsic_alignments/tatt/tatt_interface.py
sub_lowk = F
do_galaxy_intrinsic = T
ia_model = nla


[pk_to_cl_gg]
file = $IA_LIB/nonlinear_bias/nlbias.py
do_rsd = True
ell_min_linspaced = 1
ell_max_linspaced = 4
n_ell_linspaced = 5
ell_min_logspaced = 5.
ell_max_logspaced = 5.e5
n_ell_logspaced = 80
limber_ell_start = 200
ell_max_logspaced=1.e5
sig_over_dchi_exact = 3.5

lingal-lingal =
nlgal-nlgal = %(default_sample)s_density-%(default_sample)s_density
nlgal-shear = %(default_sample)s_density-%(default_sample)s_shape
nlgal-intrinsic = %(default_sample)s_density-%(default_sample)s_density

do_exact = nlgal-nlgal
do_exact = nlgal-shear
do_exact = nlgal-intrinsic
auto_only = nlgal-nlgal 
auto_only = nlgal-intrinsic

[add_magnification]
file = $COSMOSIS_LIB/structure/magnification/add_magnification.py
include_intrinsic=T

[wgg_photoz]
file=$IA_LIB1/scripts/photoz/wgg_photoz.py
sample_a = %(default_sample)s_density
sample_b = %(default_sample)s_density

[wpp_photoz]
file=$IA_LIB1/scripts/photoz/wpp_photoz.py
sample_a = %(default_sample)s_shape
sample_b = %(default_sample)s_shape

[wgp_photoz]
file=$IA_LIB1/scripts/photoz/wgp_photoz.py
sample_a = %(default_sample)s_density
sample_b = %(default_sample)s_shape

[ia_like]
file=$IA_LIB/likelihood/ialike/ialike_interface.py
apply_hartlap = F
redshifts = 1,1
ctypes = wgp wpp wgg
samples = (%(default_sample)s_density,%(default_sample)s_shape) (%(default_sample)s_shape,%(default_sample)s_shape) (%(default_sample)s_density,%(default_sample)s_density)
rmin = 6. 6. 2.
rmax = 70. 70. 70.
datafile = %(2PT_FILE)s
apply_pimax=F

